<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
    <meta name="theme-color" content="#0D3B66" />
    <title>Sem conexão - Painel Matheus</title>
    <style>
      :root {
        color-scheme: light;
        font-family: Inter, Manrope, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      }

      body {
        min-height: 100svh;
        margin: 0;
        display: grid;
        place-items: center;
        background: #f5f7fa;
        color: #0d3b66;
        padding: max(24px, env(safe-area-inset-top)) max(20px, env(safe-area-inset-right)) max(24px, env(safe-area-inset-bottom)) max(20px, env(safe-area-inset-left));
      }

      main {
        width: min(520px, 100%);
        border: 1px solid #e5eaf1;
        border-radius: 28px;
        background: #ffffff;
        box-shadow: 0 24px 80px rgba(13, 59, 102, 0.1);
        padding: 32px;
      }

      p:first-child {
        color: #1769d1;
        font-size: 12px;
        font-weight: 900;
        letter-spacing: 0.18em;
        margin: 0 0 12px;
        text-transform: uppercase;
      }

      h1 {
        font-size: clamp(2rem, 9vw, 3rem);
        line-height: 1;
        margin: 0;
      }

      p {
        color: #667085;
        font-size: 16px;
        line-height: 1.7;
      }

      button {
        min-height: 52px;
        border: 0;
        border-radius: 999px;
        background: #0d3b66;
        color: #ffffff;
        cursor: pointer;
        font: inherit;
        font-weight: 800;
        padding: 0 24px;
      }
    </style>
  </head>
  <body>
    <main>
      <p>Painel Matheus</p>
      <h1>Você está sem conexão.</h1>
      <p>Por segurança, dados privados do painel não ficam disponíveis offline. Reconecte-se para acessar imóveis, cadastros e simulações.</p>
      <button type="button" onclick="window.location.reload()">Tentar novamente</button>
    </main>
  </body>
</html>
